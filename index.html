<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>What's Out There?</title>
<meta name="description" content="Point your iPhone or iPad and find out what landmass is across the sea in that direction." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%AD%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <main class="app">
    <div class="statusbar" id="statusbar">
      <span class="stat"><span class="dot idle" id="dotCompass"></span>Compass</span>
      <span class="stat"><span class="dot idle" id="dotLocation"></span>Location</span>
      <span class="stat"><span class="dot idle" id="dotNetwork"></span>Network</span>
    </div>
    <header>
      <h1>🧭 What's Out There?</h1>
    </header>

    <section class="compass-card">
      <div class="compass">
        <div class="compass-rose" id="compassRose">
          <span class="tick n">N</span>
          <span class="tick e">E</span>
          <span class="tick s">S</span>
          <span class="tick w">W</span>
        </div>
        <div class="sightline"></div>
        <div class="hub"></div>
      </div>
      <div class="readouts">
        <div class="pointing-label" id="pointingLabel">Enable to begin</div>
        <div class="heading-readout" id="headingReadout">--&deg;</div>
        <div class="location-readout" id="locationReadout">Location: unknown</div>
        <button id="enableBtn" class="btn primary">Enable Compass &amp; Location</button>
      </div>
    </section>

    <div class="map-wrap">
      <canvas id="map"></canvas>
      <div class="map-empty" id="mapEmpty">The map appears here once your location is found.</div>
    </div>

    <button id="wootBtn" class="woot-btn" hidden>
      <span class="woot-label">🐋 Who's out there?</span>
      <span class="woot-chevron">›</span>
    </button>

    <p class="status" id="status"></p>
  </main>

  <div id="wootPanel" class="woot-panel" hidden>
    <div class="woot-sheet">
      <div class="woot-head">
        <div>
          <div class="woot-sheet-title" id="wootTitle"></div>
          <div class="woot-sheet-meta" id="wootMeta"></div>
        </div>
        <button id="wootClose" class="woot-close" aria-label="Close">✕</button>
      </div>
      <ol class="woot-list" id="wootList"></ol>
      <p class="woot-foot">🐟 most common &middot; commonality (out of 5) is illustrative &mdash; roughly how often each is seen here this season.</p>
    </div>
  </div>

  <script src="app.js?v=12"></script>
</body>
</html>
